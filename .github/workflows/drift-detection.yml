name: Source Drift Detection

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Check for upstream changes
        id: drift
        run: |
          npm run ingest:fetch
          npm run ingest:diff
          echo "drifted=$(cat .ingest-changed)" >> $GITHUB_OUTPUT
      - name: Create issue if drifted
        if: steps.drift.outputs.drifted == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('.ingest-summary', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Source drift detected - ${new Date().toISOString().split('T')[0]}`,
              body: `Upstream sources have changed.\n\n${summary}\n\nRun \`npm run ingest:full\` to update.`,
              labels: ['source-drift', 'automated']
            });
